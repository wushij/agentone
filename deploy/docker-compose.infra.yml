# 仅启动基础设施（本地开发用）
# 用法: cd deploy && docker compose -f docker-compose.infra.yml up -d

services:
  mysql:
    image: mysql:8.0
    container_name: agentone-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-agentone}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../sql/00_init_database.sql:/docker-entrypoint-initdb.d/00_init_database.sql:ro
      - ../sql/01_schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
      - ../sql/02_seed_data.sql:/docker-entrypoint-initdb.d/02_seed_data.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: agentone-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql_data:
  redis_data:
